name: reusable-issue-bot

on:
  workflow_call:
    inputs:
      runner_labels_json:
        description: JSON array for self-hosted runner labels
        required: false
        default: '["self-hosted","Windows"]'
        type: string
      engine_repository:
        description: Repository that contains the bot engine
        required: false
        default: IncleRepo/issue-to-pr-bot
        type: string
      engine_ref:
        description: Ref of the bot engine repository
        required: false
        default: main
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  run-bot:
    runs-on: ${{ fromJSON(inputs.runner_labels_json) }}

    steps:
      - name: Checkout target repository
        id: checkout-target
        uses: actions/checkout@v4
        with:
          path: target-repo
          persist-credentials: false
          fetch-depth: 1
          clean: false

      - name: Checkout bot engine
        id: checkout-engine
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.engine_repository }}
          ref: ${{ inputs.engine_ref }}
          path: engine-repo
          persist-credentials: false
          fetch-depth: 1
          clean: false

      - name: Reset target git state
        id: reset-target
        shell: powershell
        run: |
          git -C target-repo config core.autocrlf false
          git -C target-repo -c core.autocrlf=false reset --hard HEAD
          git -C target-repo status --short

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Resolve bot engine image tag
        id: engine-image
        shell: powershell
        run: |
          $dockerfilePath = Join-Path $env:GITHUB_WORKSPACE "engine-repo\Dockerfile"
          $requirementsPath = Join-Path $env:GITHUB_WORKSPACE "engine-repo\requirements.txt"
          $dockerfileHash = (Get-FileHash -LiteralPath $dockerfilePath -Algorithm SHA256).Hash.ToLower()
          $requirementsHash = (Get-FileHash -LiteralPath $requirementsPath -Algorithm SHA256).Hash.ToLower()
          $imageTag = "issue-to-pr-bot:ci-$($dockerfileHash.Substring(0, 12))-$($requirementsHash.Substring(0, 12))"
          "image_tag=$imageTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build bot engine image
        id: build-engine-image
        shell: powershell
        run: |
          $imageTag = "${{ steps.engine-image.outputs.image_tag }}"
          $existingImage = docker image ls --format "{{.Repository}}:{{.Tag}}" | Where-Object { $_ -eq $imageTag } | Select-Object -First 1
          if ($existingImage) {
            Write-Host "Reusing cached bot engine image: $imageTag"
            exit 0
          }
          $env:DOCKER_BUILDKIT = "1"
          docker build -t $imageTag engine-repo

      - name: Run bot engine
        id: run-bot-engine
        shell: powershell
        run: |
          $imageTag = "${{ steps.engine-image.outputs.image_tag }}"
          $codexHome = if ($env:CODEX_HOME_HOST) { $env:CODEX_HOME_HOST } else { Join-Path $env:USERPROFILE ".codex" }
          $authPath = Join-Path $codexHome "auth.json"
          $configPath = Join-Path $codexHome "config.toml"
          $targetWorkspace = Join-Path $env:GITHUB_WORKSPACE "target-repo"
          $botStatusDir = Join-Path $env:RUNNER_TEMP "issue-to-pr-bot-status"

          New-Item -ItemType Directory -Force -Path $botStatusDir | Out-Null

          if (-not (Test-Path -LiteralPath $authPath)) {
            throw "Codex auth.json file not found: $authPath"
          }

          if (-not (Test-Path -LiteralPath $configPath)) {
            throw "Codex config.toml file not found: $configPath"
          }

          $dockerArgs = @(
            "run", "--rm",
            "--read-only",
            "--tmpfs", "/tmp:rw,noexec,nosuid,size=64m",
            "--tmpfs", "/home/bot/.codex:rw,noexec,nosuid,size=8m,uid=1000,gid=1000",
            "--cap-drop", "ALL",
            "--security-opt", "no-new-privileges",
            "-e", "BOT_CREATE_PR=1",
            "-e", "GITHUB_EVENT_PATH=/tmp/github_event.json",
            "-e", "GITHUB_REPOSITORY=${env:GITHUB_REPOSITORY}",
            "-e", "GITHUB_REF_NAME=${env:GITHUB_REF_NAME}",
            "-e", "GITHUB_TOKEN=${env:GITHUB_TOKEN}",
            "-e", "BOT_GITHUB_TOKEN=${env:BOT_GITHUB_TOKEN}",
            "-e", "BOT_MENTION=${env:BOT_MENTION}",
            "-e", "BOT_RESET_WORKTREE=1",
            "-e", "BOT_EXTERNAL_CONTEXT_DIR=/run/external-context",
            "-e", "BOT_SECRETS_FILE=/run/bot-secrets/secrets.env",
            "-e", "BOT_COMMENT_MARKER_FILE=/run/bot-status/comment-posted",
            "-v", "${targetWorkspace}:/workspace",
            "-v", "${env:GITHUB_EVENT_PATH}:/tmp/github_event.json:ro",
            "-v", "${authPath}:/run/codex-auth/auth.json:ro",
            "-v", "${configPath}:/run/codex-auth/config.toml:ro",
            "-v", "${botStatusDir}:/run/bot-status"
          )

          if ($env:BOT_CONTEXT_DIR_HOST) {
            if (-not (Test-Path -LiteralPath $env:BOT_CONTEXT_DIR_HOST)) {
              throw "External context directory not found: $env:BOT_CONTEXT_DIR_HOST"
            }
            $dockerArgs += @("-v", "${env:BOT_CONTEXT_DIR_HOST}:/run/external-context:ro")
          }

          if ($env:BOT_SECRETS_FILE_HOST) {
            if (-not (Test-Path -LiteralPath $env:BOT_SECRETS_FILE_HOST)) {
              throw "Secret env file not found: $env:BOT_SECRETS_FILE_HOST"
            }
            $dockerArgs += @("-v", "${env:BOT_SECRETS_FILE_HOST}:/run/bot-secrets/secrets.env:ro")
          }

          $dockerArgs += @(
            $imageTag,
            "sh",
            "-lc",
            "cp /run/codex-auth/auth.json /home/bot/.codex/auth.json && cp /run/codex-auth/config.toml /home/bot/.codex/config.toml && chmod 600 /home/bot/.codex/auth.json /home/bot/.codex/config.toml && codex --version && codex login status && python -m app.main"
          )

          docker @dockerArgs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          BOT_GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          BOT_MENTION: ${{ vars.BOT_MENTION }}
          CODEX_HOME_HOST: ${{ vars.CODEX_HOME_HOST }}
          BOT_CONTEXT_DIR_HOST: ${{ vars.BOT_CONTEXT_DIR_HOST }}
          BOT_SECRETS_FILE_HOST: ${{ vars.BOT_SECRETS_FILE_HOST }}

      - name: Comment on workflow failure
        if: failure()
        shell: powershell
        run: |
          $markerPath = Join-Path $env:RUNNER_TEMP "issue-to-pr-bot-status\comment-posted"
          if (Test-Path -LiteralPath $markerPath) {
            Write-Host "Bot already posted a status comment. Skipping fallback workflow failure comment."
            exit 0
          }

          $event = Get-Content -LiteralPath $env:GITHUB_EVENT_PATH -Raw | ConvertFrom-Json
          $issueNumber = $null

          if ($event.issue -and $event.issue.number) {
            $issueNumber = [int]$event.issue.number
          } elseif ($event.pull_request -and $event.pull_request.number) {
            $issueNumber = [int]$event.pull_request.number
          }

          if (-not $issueNumber) {
            Write-Host "Could not determine issue or pull request number for fallback comment."
            exit 0
          }

          $failedStep = "unknown"
          $stepOutcomes = @(
            @{ Name = "Checkout target repository"; Outcome = "${{ steps.checkout-target.outcome }}" },
            @{ Name = "Checkout bot engine"; Outcome = "${{ steps.checkout-engine.outcome }}" },
            @{ Name = "Reset target git state"; Outcome = "${{ steps.reset-target.outcome }}" },
            @{ Name = "Create GitHub App token"; Outcome = "${{ steps.app-token.outcome }}" },
            @{ Name = "Resolve bot engine image tag"; Outcome = "${{ steps.engine-image.outcome }}" },
            @{ Name = "Build bot engine image"; Outcome = "${{ steps.build-engine-image.outcome }}" },
            @{ Name = "Run bot engine"; Outcome = "${{ steps.run-bot-engine.outcome }}" }
          )

          foreach ($step in $stepOutcomes) {
            if ($step.Outcome -eq "failure") {
              $failedStep = $step.Name
              break
            }
          }

          $runUrl = "https://github.com/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
          $body = @"
## 실행 결과

### 요약
- 상태: `failed`
- 실패 단계: `$failedStep`
- 오류 분류: `workflow`

### 상세
봇 엔진이 이슈 댓글을 남기기 전에 워크플로 단계에서 실패했습니다.

### 다음 단계
- Actions 로그 확인: $runUrl
- 같은 멘션으로 다시 요청해 재시도
"@.Trim()

          $payload = @{ body = $body } | ConvertTo-Json -Depth 3
          $headers = @{
            Accept = "application/vnd.github+json"
            Authorization = "Bearer $env:GITHUB_TOKEN"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $uri = "https://api.github.com/repos/$env:GITHUB_REPOSITORY/issues/$issueNumber/comments"
          Invoke-RestMethod -Method Post -Uri $uri -Headers $headers -ContentType "application/json" -Body $payload | Out-Null
        env:
          GITHUB_TOKEN: ${{ github.token }}
