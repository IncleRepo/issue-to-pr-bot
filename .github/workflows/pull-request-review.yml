name: pull-request-review-bot

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  auto-merge-bot-pr:
    if: >
      (
        github.event.review.author_association == 'OWNER' ||
        github.event.review.author_association == 'MEMBER' ||
        github.event.review.author_association == 'COLLABORATOR'
      ) &&
      github.event.review.state == 'approved' &&
      (
        vars.BOT_MENTION == '' ||
        !contains(github.event.review.body, vars.BOT_MENTION)
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout bot engine
        uses: actions/checkout@v4
        with:
          repository: IncleRepo/issue-to-pr-bot
          ref: main
          path: engine-repo
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Handle approved review auto-merge
        working-directory: engine-repo
        run: python -m app.review_merge_runner
        env:
          GITHUB_TOKEN: ${{ github.token }}
          BOT_GITHUB_TOKEN: ${{ github.token }}

  run-bot:
    if: >
      (
        github.event.review.author_association == 'OWNER' ||
        github.event.review.author_association == 'MEMBER' ||
        github.event.review.author_association == 'COLLABORATOR'
      ) &&
      vars.BOT_MENTION != '' &&
      contains(github.event.review.body, vars.BOT_MENTION)
    uses: ./.github/workflows/reusable-bot.yml
    secrets: inherit
    with:
      runner_labels_json: '["self-hosted","Windows"]'
