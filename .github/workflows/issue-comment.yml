name: issue-comment-bot

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: read
  pull-requests: write

jobs:
  run-bot:
    if: >
      contains(github.event.comment.body, '/bot run') &&
      github.event.issue.pull_request == null &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    runs-on: [self-hosted, Windows]

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Docker 이미지 빌드
        run: docker build -t issue-to-pr-bot:ci .

      - name: 테스트 실행
        shell: powershell
        run: |
          docker run --rm `
            --read-only `
            --tmpfs /tmp:rw,noexec,nosuid,size=64m `
            --cap-drop ALL `
            --security-opt no-new-privileges `
            -v "${env:GITHUB_WORKSPACE}:/workspace:ro" `
            issue-to-pr-bot:ci `
            python -m app.run_configured_command

      - name: Codex 인증 확인
        shell: powershell
        run: |
          $codexHome = if ($env:CODEX_HOME_HOST) { $env:CODEX_HOME_HOST } else { Join-Path $env:USERPROFILE ".codex" }
          $authPath = Join-Path $codexHome "auth.json"
          $configPath = Join-Path $codexHome "config.toml"

          if (-not (Test-Path -LiteralPath $authPath)) {
            throw "Codex auth.json 파일을 찾을 수 없습니다: $authPath"
          }

          if (-not (Test-Path -LiteralPath $configPath)) {
            throw "Codex config.toml 파일을 찾을 수 없습니다: $configPath"
          }

          docker run --rm `
            --read-only `
            --tmpfs /tmp:rw,noexec,nosuid,size=64m `
            --tmpfs /home/bot/.codex:rw,noexec,nosuid,size=8m,uid=1000,gid=1000 `
            --cap-drop ALL `
            --security-opt no-new-privileges `
            -v "${authPath}:/run/codex-auth/auth.json:ro" `
            -v "${configPath}:/run/codex-auth/config.toml:ro" `
            issue-to-pr-bot:ci `
            sh -lc "cp /run/codex-auth/auth.json /home/bot/.codex/auth.json && cp /run/codex-auth/config.toml /home/bot/.codex/config.toml && chmod 600 /home/bot/.codex/auth.json /home/bot/.codex/config.toml && codex --version && codex login status"
        env:
          CODEX_HOME_HOST: ${{ vars.CODEX_HOME_HOST }}

      - name: 봇 실행
        shell: powershell
        run: |
          docker run --rm `
            --read-only `
            --tmpfs /tmp:rw,noexec,nosuid,size=64m `
            --cap-drop ALL `
            --security-opt no-new-privileges `
            -e BOT_CREATE_PR=1 `
            -e GITHUB_EVENT_PATH=/tmp/github_event.json `
            -e GITHUB_REPOSITORY="${env:GITHUB_REPOSITORY}" `
            -e GITHUB_REF_NAME="${env:GITHUB_REF_NAME}" `
            -e GITHUB_TOKEN="${env:GITHUB_TOKEN}" `
            -e BOT_GITHUB_TOKEN="${env:BOT_GITHUB_TOKEN}" `
            -v "${env:GITHUB_WORKSPACE}:/workspace" `
            -v "${env:GITHUB_EVENT_PATH}:/tmp/github_event.json:ro" `
            issue-to-pr-bot:ci
        env:
          GITHUB_TOKEN: ${{ github.token }}
          BOT_GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
