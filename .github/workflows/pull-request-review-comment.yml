name: pull-request-review-comment-bot

on:
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  run-bot:
    if: >
      vars.BOT_MENTION != '' &&
      contains(github.event.comment.body, vars.BOT_MENTION) &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    uses: ./.github/workflows/reusable-bot.yml
    secrets: inherit
    with:
      runner_labels_json: '["self-hosted","Windows"]'
